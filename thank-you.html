<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Arabtech Machinery</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-family-main);
      background-color: var(--color-dark-main);
      color: var(--color-text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .thankyou-container {
      background-color: var(--color-dark-accent);
      padding: 60px 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      max-width: 600px;
      width: 90%;
      animation: fadeInUp 1s ease;
    }

    .thankyou-container i {
      font-size: 4em;
      color: var(--color-primary-cta);
      margin-bottom: 20px;
      animation: bounce 1.2s infinite;
    }

    .thankyou-container h1 {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--color-primary-cta);
    }

    .thankyou-container p {
      color: var(--color-text-gray);
      font-size: 1.1em;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* Adjusted button height here ↓ */
    .btn-secondary {
      background-color: transparent;
      border: 2px solid var(--color-primary-cta);
      color: var(--color-primary-cta);
      padding: 9px 22px; /* reduced height */
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s, color 0.3s, transform 0.2s;
    }

    .btn-secondary:hover {
      background-color: var(--color-primary-cta);
      color: var(--color-dark-main);
      transform: translateY(-3px);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .thankyou-container {
        padding: 40px 25px;
      }

      .thankyou-container i {
        font-size: 3.2em;
      }

      .thankyou-container h1 {
        font-size: 2em;
      }

      .thankyou-container p {
        font-size: 1em;
      }

      .btn-secondary {
        padding: 8px 20px; /* smaller on mobile too */
        font-size: 0.95em;
      }
    }

    @media (max-width: 480px) {
      .thankyou-container {
        padding: 30px 20px;
      }

      .thankyou-container h1 {
        font-size: 1.8em;
      }

      .thankyou-container p {
        font-size: 0.95em;
      }

      .btn-secondary {
        width: 100%;
        font-size: 1em;
        padding: 10px 0; /* consistent thin look */
      }
    }
  </style>
</head>
<body>

  <div class="thankyou-container">
    <i class="fas fa-check-circle"></i>
    <h1>Thank You!</h1>
    <p>Your inquiry has been successfully sent.<br>Our certified team will contact you shortly.</p>
    <a href="index.html" class="btn-secondary"><i class="fas fa-home"></i> Back to Home</a>
  </div>

</body>
</html>
